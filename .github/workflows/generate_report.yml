name: Generate Daily Report & Upload Artifacts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run skill-e-report to generate outputs
        run: |
          mkdir -p output/artifacts
          skill-e-report generate \
            --network examples/network_analysis.json \
            --trends examples/trend_analysis.json \
            --predictions examples/prediction_analysis.json \
            --papers examples/papers.json \
            --query "embodied navigation cs.RO" \
            --output output/daily_report.md \
            --json-output output/merged_data.json \
            --artifacts-dir output/artifacts

      - name: Package results for download
        run: |
          tar -czf output/skill_e_results.tar.gz -C output .

      - name: Upload generated files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skill-e-report-results
          path: output/
          retention-days: 7
